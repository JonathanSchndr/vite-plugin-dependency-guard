name: Publish to npm

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tag commit is on main/master
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_SHA="${GITHUB_SHA}"
          git fetch origin main master --depth=1 || true

          if git branch -r --contains "$TAG_SHA" | grep -E 'origin/(main|master)' >/dev/null; then
            echo "Tag commit belongs to main/master."
          else
            echo "Tag commit is not on main/master. Skipping publish."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
